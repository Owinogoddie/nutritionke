{% if messages %}
<div class="space-y-2 mb-6">
  {% for message in messages %}
  <div
    class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium {% if message.tags == 'success' %}bg-green-50 text-green-800 border border-green-200 dark:bg-green-900/20 dark:text-green-300 dark:border-green-800 {% elif message.tags == 'error' %}bg-red-50 text-red-800 border border-red-200 dark:bg-red-900/20 dark:text-red-300 dark:border-red-800 {% elif message.tags == 'warning' %}bg-yellow-50 text-yellow-800 border border-yellow-200 dark:bg-yellow-900/20 dark:text-yellow-300 dark:border-yellow-800 {% else %}bg-blue-50 text-blue-800 border border-blue-200 dark:bg-blue-900/20 dark:text-blue-300 dark:border-blue-800{% endif %}"
  >
    <span>{{ message }}</span>
  </div>
  {% endfor %}
</div>
{% endif %}
