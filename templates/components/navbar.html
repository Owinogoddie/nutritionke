<nav
  class="bg-white dark:bg-gray-800 border-b border-orange-100 dark:border-gray-700 sticky top-0 z-50 shadow-sm"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <!-- Left side: Hamburger + Logo -->
      <div class="flex items-center gap-3">
        <button
          onclick="openSidebar()"
          class="lg:hidden p-2 rounded-lg text-gray-500 hover:bg-orange-100 dark:hover:bg-gray-700 transition-colors"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>

        <a href="{% url 'dashboard:home' %}" class="flex items-center gap-2">
          <div class="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center">
            <span class="text-white font-bold text-sm">N</span>
          </div>
          <span class="font-bold text-orange-600 dark:text-orange-400 text-lg">{{ APP_NAME }}</span>
        </a>
      </div>

      <!-- Right side -->
      <div class="flex items-center gap-4">
        <!-- Dark mode toggle -->
        <button
          onclick="toggleTheme()"
          class="p-2 rounded-lg hover:bg-orange-50 dark:hover:bg-gray-700 transition-colors"
        >
          <svg id="sun-icon" class="w-5 h-5 text-gray-600 dark:text-gray-300 hidden dark:block"
            fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>
          </svg>
          <svg id="moon-icon" class="w-5 h-5 text-gray-600 dark:hidden"
            fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>

        <!-- User avatar -->
        <div class="relative">
          <button class="flex items-center gap-2 p-2 rounded-lg hover:bg-orange-50 dark:hover:bg-gray-700 transition-colors">
            <div class="w-8 h-8 bg-orange-200 dark:bg-orange-900 rounded-full flex items-center justify-center">
              <span class="text-orange-700 dark:text-orange-300 font-semibold text-sm">
                {{ user.first_name|first|upper }}
              </span>
            </div>
            <span class="text-sm font-medium hidden sm:block">{{ user.first_name }}</span>
          </button>
        </div>

        <!-- Sign out — triggers modal -->
        <button
          onclick="openLogoutModal()"
          class="text-sm text-gray-500 hover:text-orange-600 transition-colors"
        >
          Sign out
        </button>
      </div>
    </div>
  </div>
</nav>

<!-- Logout Confirmation Modal -->
<div
  id="logout-modal"
  class="fixed inset-0 z-50 flex items-center justify-center hidden"
>
  <!-- Overlay -->
  <div
    class="absolute inset-0 bg-black/50"
    onclick="closeLogoutModal()"
  ></div>

  <!-- Modal card -->
  <div class="relative bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-6 w-full max-w-sm mx-4 z-10">
    <div class="text-center">
      <div class="w-14 h-14 bg-orange-100 dark:bg-orange-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
      </div>
      <h3 class="text-lg font-bold text-gray-800 dark:text-white mb-1">Sign out?</h3>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">
        You'll need to sign in again to access your account.
      </p>
      <div class="flex gap-3">
        <button
          onclick="closeLogoutModal()"
          class="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors"
        >
          Cancel
        </button>
        <a
          href="{% url 'accounts:logout' %}"
          class="flex-1 px-4 py-2.5 rounded-xl bg-orange-500 hover:bg-orange-600 text-white text-sm font-medium text-center transition-colors"
        >
          Sign out
        </a>
      </div>
    </div>
  </div>
</div>

<script>
  function openLogoutModal() {
    document.getElementById('logout-modal').classList.remove('hidden');
    document.body.classList.add('overflow-hidden');
  }
  function closeLogoutModal() {
    document.getElementById('logout-modal').classList.add('hidden');
    document.body.classList.remove('overflow-hidden');
  }
  // Close on Escape key
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeLogoutModal();
  });
</script>
